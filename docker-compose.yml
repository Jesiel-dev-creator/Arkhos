# ArkhosAI Docker Compose for WSL2 Ubuntu
# Optimized for development with hot-reloading and proper volume mounts
version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arkhos_backend
    restart: unless-stopped
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///arkhos.db
    volumes:
      - ./backend:/app/backend
      - arkhos_data:/app/data
    ports:
      - "8000:8000"
    networks:
      - arkhos_network
    depends_on:
      - redis
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arkhos_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    networks:
      - arkhos_network
    stdin_open: true
    tty: true
    
  redis:
    image: redis:7-alpine
    container_name: arkhos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arkhos_network
    
  nginx:
    image: nginx:1.25-alpine
    container_name: arkhos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - arkhos_network

volumes:
  arkhos_data:
    driver: local
  redis_data:
    driver: local

networks:
  arkhos_network:
    driver: bridge
    name: arkhos_network